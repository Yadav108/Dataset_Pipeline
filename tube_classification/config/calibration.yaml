# Grid calibration parameters for 5×10 tube rack

grid_map:
  rows: 5
  cols: 10
  slot_height_mm: 20
  slot_width_mm: 20

depth_baseline_mm: 330

aruco_markers:
  - id: 0
    position_px: [10, 10]
    physical_position: [0, 0]
  - id: 1
    position_px: [1270, 10]
    physical_position: [1280, 0]
  - id: 2
    position_px: [10, 710]
    physical_position: [0, 720]
  - id: 3
    position_px: [1270, 710]
    physical_position: [1280, 720]
