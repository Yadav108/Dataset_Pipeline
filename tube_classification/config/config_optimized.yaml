# Camera configuration: resolution, frame rate, and depth sensor range
camera:
  width: 848
  height: 480
  fps: 30
  depth_min_m: 0.25
  depth_max_m: 0.80

# Storage configuration: data directory paths and session naming
storage:
  root_dir: dataset/raw
  registry_path: config/registry.yaml
  sam_weights_path: models/mobile_sam.pt
  session_prefix: session

# Pipeline configuration: processing thresholds and algorithm parameters
pipeline:
  stability_frames: 4
  # OPTIMIZED: Blur threshold - increased from 40.0 for better yield
  # Previous: 40.0 rejected ~35% of captures
  # New: 50.0 rejects ~20% of captures (balanced approach)
  blur_threshold: 50.0
  
  duplicate_hash_threshold: 12
  
  # OPTIMIZED: Minimum coverage ratio - increased from 0.35 for better quality
  # Previous: 0.35 (very permissive - allowed 65% gaps)
  # New: 0.45 (stricter - ensures 45%+ mask coverage)
  # Expected: ~15% improvement in mask quality consistency
  min_coverage_ratio: 0.45
  
  min_roi_area_px: 300
  sam_iou_threshold: 0.60
  depth_stability_threshold: 0.012
  max_roi_area_px: 120000
  min_tube_dim_px: 20
  max_tube_dim_px: 350
  min_tube_length_px: 40
  max_tube_length_px: 900
  min_solidity: 0.10
  border_margin_px: 15

  # Top-down capture mode shape filter
  top_min_roi_area_px: 200
  top_max_roi_area_px: 6000
  top_min_tube_dim_px: 8
  top_max_tube_dim_px: 80
  top_max_circularity_ratio: 2.5
  top_min_solidity: 0.35
  top_border_margin_px: 30

  # Top-down depth zone (camera pointing down at rack)
  # Camera-to-rack distance: 42cm; margin ±5cm → [0.37, 0.47]
  top_depth_min_m: 0.37
  top_depth_max_m: 0.47

  # Checkpoint configuration for crash recovery
  checkpoint_interval: 25  # Save manifest snapshot every N successful captures

  # Live preview window
  show_preview: true  # Display live preview with overlay annotations

  # Per-class capture target
  target_images_per_class: 500  # Stop capture when this many images collected for a class

  # Background removal (final cleaning step)
  background_removal: true  # Remove backgrounds from ROI crops and save separately

  # NEW: Quality event logging
  enable_quality_logging: true
  quality_log_dir: logs/quality

  # Preview settings for live overhead view
  preview:
    depth_tolerance_mm: 20.0           # Depth threshold for occupation detection (mm below baseline)
    grid_line_alpha: 0.3                # Transparency of grid overlay (0.0-1.0)
    grid_line_color: [255, 255, 255]   # Grid line color (BGR)
    occupied_color: [0, 255, 0]         # Occupied slot highlight color (BGR: green)
    empty_color: [128, 128, 128]        # Empty slot color (BGR: gray)
    fps_display: true                   # Show FPS in status bar

  # Confirmation preview settings for per-slot review
  # OPTIMIZED: More consistent with main pipeline thresholds
  confirmation:
    zoom_factor: 4                      # Magnification of zoomed ROI view
    depth_stable_variance_mm: 5.0       # Variance threshold for depth stability (mm)
    depth_expected_mm: 330              # Expected depth baseline (mm)
    # OPTIMIZED: Reduced from 100.0 for better consistency
    # Was: 100.0 (very strict - 2.5x stricter than main blur_threshold)
    # Now: 85.0 (stricter but more balanced with main pipeline)
    blur_threshold: 85.0
    
    # OPTIMIZED: Reduced from 0.85 for better coverage detection
    # Was: 0.85 (very strict)
    # Now: 0.75 (stricter than main pipeline but reasonable)
    mask_confidence_threshold: 0.75
    
    # NEW: Operator reference threshold
    coverage_ratio_min: 0.40
    
    panel_width_px: 300                 # Width of metrics panel (pixels)
    show_metrics: true                  # Display quality metrics in confirmation window

  # Capture mode and session settings
  capture:
    mode_timeout_seconds: 60            # Timeout for user mode selection (seconds)
    max_retries: 3                      # Maximum retakes per slot
    auto_export_on_session_end: false   # Automatically export after session
    log_level: 'INFO'                   # Logging level (DEBUG, INFO, WARNING, ERROR)
    save_depth_frames: true             # Save depth as NPZ
    save_segmentation_masks: true       # Save MobileSAM masks

  # Session organization settings
  session:
    base_directory: 'dataset/sessions'  # Root directory for sessions
    auto_resume: false                  # Automatically resume interrupted sessions
    cleanup_on_reject: true             # Delete rejected captures immediately
    compression_level: 9                # PNG compression (0-9)
